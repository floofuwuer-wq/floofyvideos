<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>stuff</title>
<style>
:root {
    --bg: #181a20;
    --fg: #f1f1f1;
    --accent: #4f8cff;
    --accent-hover: #3570d4;
    --border: #23262f;
    --card: #23262f;
    --input-bg: #23262f;
    --input-fg: #f1f1f1;
    --input-border: #353945;
    --button-bg: var(--accent);
    --button-fg: #fff;
    --button-disabled: #3a3f4b;
    --button-hover: var(--accent-hover);
    --shadow: 0 2px 16px 0 rgba(0,0,0,0.25);
}

body {
    background: var(--bg);
    color: var(--fg);
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h2 {
    color: var(--accent);
    margin-top: 40px;
}

#list {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.item {
    background: var(--card);
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.item:hover {
    background: var(--accent);
}

video {
    margin-top: 20px;
    width: 80%;
    max-width: 900px;
    border-radius: 12px;
    display: none;
}
</style>
</head>
<body>

<h2>videos</h2>
<div id="list"></div>
<video id="player" controls></video>

<script>
const list = document.getElementById("list")
const player = document.getElementById("player")

const videoExts = [
".mp4",".webm",".ogg",".mov",".mkv",".avi",".wmv",".flv",".m4v",".3gp",".3g2"
]

fetch("https://api.github.com/repos/NotFloofy/floofyvideos/contents/videos")
.then(r=>r.json())
.then(files=>{
    files.forEach(f=>{
        if(!f.name) return

        const nameLower = f.name.toLowerCase()
        if(!videoExts.some(ext=>nameLower.endsWith(ext))) return

        const cleanName = f.name.replace(/\.[^/.]+$/, "")

        const d = document.createElement("div")
        d.className = "item"
        d.innerText = cleanName

        d.onclick = ()=>{
            player.style.display = "block"
            player.src = f.download_url

            player.load()

            const tryPlay = player.play()
            if(tryPlay !== undefined){
                tryPlay.catch(()=>{
                    window.open(f.download_url, "_blank")
                })
            }
        }

        list.appendChild(d)
    })
})
.catch(e=>{
    console.log("rip loading vids", e)
})
</script>

</body>
</html>
